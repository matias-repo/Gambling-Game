<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>💎 ELITE CASINO · 12 GAMES · ANIMATED LUXE</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
    }

    body {
      background: radial-gradient(circle at 20% 30%, #1a1230, #03010a);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      margin: 0;
      animation: bgPulse 8s infinite alternate;
    }

    @keyframes bgPulse {
      0% { background: radial-gradient(circle at 20% 30%, #1a1230, #03010a); }
      100% { background: radial-gradient(circle at 80% 70%, #201838, #02000a); }
    }

    .grand-casino {
      max-width: 1300px;
      width: 100%;
      background: rgba(10, 6, 22, 0.75);
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      border: 1px solid rgba(240, 200, 80, 0.5);
      box-shadow: 0 50px 80px rgba(0,0,0,0.9), 0 0 60px rgba(220, 180, 60, 0.35);
      border-radius: 3.5rem;
      padding: 2.2rem 2rem 2rem;
      display: flex;
      flex-direction: column;
      gap: 2rem;
      transition: all 0.3s ease;
      animation: floatContainer 4s ease-in-out infinite;
    }

    @keyframes floatContainer {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-5px); }
      100% { transform: translateY(0px); }
    }

    .top-panel {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      background: rgba(0,0,0,0.55);
      border-radius: 4rem;
      padding: 1.2rem 2.2rem;
      border: 1px solid rgba(212, 175, 55, 0.7);
      backdrop-filter: blur(15px);
      box-shadow: 0 15px 25px rgba(0,0,0,0.6);
    }

    .balance-section {
      display: flex;
      align-items: center;
      gap: 25px;
      flex-wrap: wrap;
    }

    .coin-badge {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 800;
      font-size: 2.6rem;
      background: linear-gradient(145deg, #f9d56e, #b8861c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 15px gold);
    }

    .coin-badge span {
      background: rgba(20, 15, 35, 0.85);
      padding: 0.3rem 1.6rem;
      border-radius: 3rem;
      border: 1.5px solid #e6b422;
      -webkit-text-fill-color: #ffdf80;
      font-size: 2.4rem;
      box-shadow: inset 0 0 12px rgba(255,215,0,0.5);
      animation: coinGlow 2s infinite alternate;
    }

    @keyframes coinGlow {
      0% { box-shadow: inset 0 0 8px gold; }
      100% { box-shadow: inset 0 0 22px #ffb300; }
    }

    .rock-bottom-banner {
      background: #2f2347;
      padding: 0.6rem 1.8rem;
      border-radius: 3rem;
      color: #edd9a3;
      font-weight: 700;
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      border: 1px dashed #c9a53b;
      animation: softShake 2.5s infinite;
    }

    @keyframes softShake {
      0%,100%{ transform: rotate(0deg); }
      25%{ transform: rotate(1deg); }
      75%{ transform: rotate(-1deg); }
    }

    .game-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(145px, 1fr));
      gap: 0.9rem;
      margin: 0.4rem 0 0.8rem;
    }

    .game-card {
      background: rgba(25, 19, 40, 0.75);
      backdrop-filter: blur(12px);
      border-radius: 2.3rem;
      padding: 1.2rem 0.5rem;
      text-align: center;
      border: 1.5px solid rgba(210, 160, 40, 0.55);
      box-shadow: 0 10px 22px rgba(0,0,0,0.7);
      transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      color: #f0e3c2;
      transform: scale(1);
    }

    .game-card:hover {
      transform: translateY(-6px) scale(1.03);
      border-color: #f5c84e;
      box-shadow: 0 20px 30px rgba(230, 170, 20, 0.5);
      background: rgba(35, 25, 58, 0.9);
    }

    .game-card:active {
      transform: scale(0.96);
    }

    .game-icon {
      font-size: 2.8rem;
      filter: drop-shadow(0 6px 8px black);
      animation: iconBounce 2.2s infinite alternate ease-in-out;
    }

    @keyframes iconBounce {
      0% { transform: translateY(0px); }
      100% { transform: translateY(-4px); }
    }

    .active-game-area {
      background: rgba(0,0,0,0.5);
      border-radius: 2.8rem;
      padding: 1.8rem;
      border: 2px solid rgba(212,175,55,0.5);
      backdrop-filter: blur(18px);
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      animation: fadeSlide 0.5s ease;
    }

    @keyframes fadeSlide {
      0% { opacity: 0.6; transform: translateY(8px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    button {
      background: linear-gradient(180deg, #f7dd7e 0%, #b68b2c 100%);
      border: none;
      border-radius: 3rem;
      padding: 0.8rem 2rem;
      font-weight: 800;
      color: #1e1529;
      letter-spacing: 0.8px;
      cursor: pointer;
      box-shadow: 0 7px 0 #5c3f14, 0 10px 20px black;
      transition: all 0.08s linear;
      text-transform: uppercase;
      font-size: 0.85rem;
      border: 1px solid #efcd70;
      position: relative;
      overflow: hidden;
    }

    button:hover {
      background: linear-gradient(180deg, #ffea8c, #c99b2e);
    }

    button:active {
      transform: translateY(5px);
      box-shadow: 0 2px 0 #4c3512, 0 7px 14px black;
    }

    .result-message {
      background: rgba(34, 29, 49, 0.9);
      padding: 0.9rem 2rem;
      border-radius: 2.5rem;
      font-weight: 700;
      color: #fadf8a;
      backdrop-filter: blur(10px);
      transition: 0.2s;
    }

    .reel-spin {
      display: inline-block;
      animation: reelAnim 0.3s ease-out;
    }

    @keyframes reelAnim {
      0% { transform: translateY(-20px); opacity:0; }
      100% { transform: translateY(0); opacity:1; }
    }

    .win-flash {
      animation: winPulse 0.6s ease 2;
    }

    @keyframes winPulse {
      0% { background: rgba(255,215,0,0.2); }
      50% { background: rgba(255,215,0,0.7); }
      100% { background: rgba(255,215,0,0.2); }
    }
  </style>
</head>
<body>
<div class="grand-casino">
  <div class="top-panel">
    <div class="balance-section">
      <div class="coin-badge">
        💰 <span id="balanceDisplay">500</span>
      </div>
      <div class="rock-bottom-banner" id="rockBottomMsg">
        🆘 <span>Rock bottom? +100 tokens</span>
      </div>
    </div>
    <button id="resetBalanceBtn" style="background:#3e2e51; color:#f5e3b0; box-shadow:0 5px 0 #231b2c;">↺ RESET 500</button>
  </div>

  <div class="game-grid" id="gameGrid"></div>

  <div class="active-game-area" id="activeGamePanel">
    <div class="game-header" style="display:flex; justify-content:space-between;">
      <span id="currentGameTitle" style="font-weight:700; font-size:1.4rem;">🎲 SELECT GAME</span>
      <span id="gameInstruction" style="color:#cfb87c;">Click any game</span>
    </div>
    <div id="dynamicGameContent" style="min-height:140px;"></div>
  </div>
  <div id="globalMessage" class="result-message" style="text-align:center; font-weight:bold;">✨ Welcome! 500 tokens.</div>
</div>

<script>
  (function() {
    let balance = 500;
    const BALANCE_KEY = 'luxeAnimatedCasino';
    try {
      const saved = localStorage.getItem(BALANCE_KEY);
      if (saved) { let v = parseFloat(saved); if (!isNaN(v) && v>=0) balance = v; }
    } catch(e) {}

    function saveBalance() { localStorage.setItem(BALANCE_KEY, balance); }
    function updateUI() { document.getElementById('balanceDisplay').textContent = balance; saveBalance(); }

    let rockBottomGiven = false;
    function checkRockBottom() {
      if (balance <= 0) {
        if (!rockBottomGiven) {
          balance += 100;
          rockBottomGiven = true;
          document.getElementById('globalMessage').textContent = '🆘 ROCK BOTTOM! +100 tokens gifted.';
          animateElement('globalMessage', 'win-flash');
        } else {
          if (balance < 0) balance = 0;
        }
      } else {
        rockBottomGiven = false;
      }
      updateUI();
    }

    function adjustBalance(amount) {
      balance += amount;
      if (balance < 0) balance = 0;
      updateUI();
      checkRockBottom();
    }

    function setBalance(v) { balance = v; if(balance<0)balance=0; updateUI(); checkRockBottom(); }
    document.getElementById('resetBalanceBtn').addEventListener('click', ()=>{
      setBalance(500); rockBottomGiven = false;
      document.getElementById('globalMessage').textContent = '🔄 Balance reset.';
    });

    function animateElement(id, className) {
      const el = document.getElementById(id);
      if(!el) return;
      el.classList.add(className);
      setTimeout(()=> el.classList.remove(className), 700);
    }

    const games = [
      {name:"🎰 Slots",id:"slots",icon:"🎰",desc:"Spin & match"},
      {name:"🃏 Blackjack",id:"blackjack",icon:"🃏",desc:"21 duel"},
      {name:"🎡 Roulette",id:"roulette",icon:"🎡",desc:"Color/number"},
      {name:"🎲 Craps",id:"craps",icon:"🎲",desc:"Dice 7/11"},
      {name:"💰 Hi-Lo",id:"hilo",icon:"💰",desc:"Higher/Lower"},
      {name:"🍒 FruitSlots",id:"fruitslots",icon:"🍒",desc:"Juicy spins"},
      {name:"♠️ PokerFlip",id:"pokerflip",icon:"♠️",desc:"Hand rank"},
      {name:"🎯 Keno",id:"keno",icon:"🎯",desc:"Pick numbers"},
      {name:"🏇 HorseRace",id:"horserace",icon:"🏇",desc:"Bet on horse"},
      {name:"💣 Mines",id:"mines",icon:"💣",desc:"Avoid bombs"},
      {name:"🔢 Baccarat",id:"baccarat",icon:"🔢",desc:"Player/Banker"},
      {name:"🎱 Plinko",id:"plinko",icon:"🎱",desc:"Drop ball"}
    ];

    const grid = document.getElementById('gameGrid');
    const titleEl = document.getElementById('currentGameTitle');
    const instrEl = document.getElementById('gameInstruction');
    const contentDiv = document.getElementById('dynamicGameContent');
    let activeId = null;

    function renderGrid() {
      grid.innerHTML = '';
      games.forEach(g => {
        const card = document.createElement('div');
        card.className = 'game-card';
        card.innerHTML = `<div class="game-icon">${g.icon}</div><div class="game-name">${g.name}</div>`;
        card.addEventListener('click', ()=>{
          activeId = g.id;
          titleEl.textContent = g.icon + ' ' + g.name;
          instrEl.textContent = g.desc;
          loadGame(g.id);
          document.querySelectorAll('.game-card').forEach(c => c.style.borderColor = 'rgba(210,160,40,0.45)');
          card.style.borderColor = '#f5d742';
        });
        grid.appendChild(card);
      });
    }

    function loadGame(id) {
      contentDiv.innerHTML = '';
      switch(id) {
        case 'slots': buildSlots(); break;
        case 'blackjack': buildBlackjack(); break;
        case 'roulette': buildRoulette(); break;
        case 'craps': buildCraps(); break;
        case 'hilo': buildHiLo(); break;
        case 'fruitslots': buildFruitSlots(); break;
        case 'pokerflip': buildPokerFlip(); break;
        case 'keno': buildKeno(); break;
        case 'horserace': buildHorseRace(); break;
        case 'mines': buildMines(); break;
        case 'baccarat': buildBaccarat(); break;
        case 'plinko': buildPlinko(); break;
      }
    }

    function getBetInput(defaultVal=10) {
      const inp = document.createElement('input');
      inp.type='number'; inp.className='bet-input'; inp.value=defaultVal; inp.min=1; inp.max=balance;
      return inp;
    }

    function buildSlots() {
      contentDiv.innerHTML = `<div class="flex-row" style="display:flex; gap:12px; align-items:center;"><span>🎰 Bet:</span><input id="slotBet" class="bet-input" value="10" min="1"><button id="spinSlots">SPIN</button></div>
      <div style="font-size:3rem; letter-spacing:15px; margin:15px 0;" id="slotReels">🍒 🍋 🍊</div><div id="slotResult" class="result-message"></div>`;
      document.getElementById('spinSlots').addEventListener('click', ()=>{
        const bet = parseInt(document.getElementById('slotBet').value)||10;
        if(bet>balance) { alertMsg('Not enough tokens'); return; }
        adjustBalance(-bet);
        const symbols = ['🍒','🍋','🍊','🍇','💎','7️⃣'];
        const r1=symbols[Math.floor(Math.random()*symbols.length)];
        const r2=symbols[Math.floor(Math.random()*symbols.length)];
        const r3=symbols[Math.floor(Math.random()*symbols.length)];
        const reelDiv = document.getElementById('slotReels');
        reelDiv.innerHTML = `<span class="reel-spin">${r1}</span> <span class="reel-spin">${r2}</span> <span class="reel-spin">${r3}</span>`;
        let win=0;
        if(r1===r2 && r2===r3) win=bet*10;
        else if(r1===r2||r2===r3||r1===r3) win=bet*2;
        if(win>0){ adjustBalance(win); document.getElementById('slotResult').textContent=`🏆 +${win}`; animateElement('slotResult','win-flash');}
        else document.getElementById('slotResult').textContent='😵 Loss';
      });
    }

    function buildBlackjack() {
      contentDiv.innerHTML = `<div style="display:flex; gap:10px;"><span>🃏 Bet:</span><input id="bjBet" class="bet-input" value="20"><button id="dealBJ">DEAL</button></div><div id="bjTable" style="font-size:1.3rem;"></div>`;
      document.getElementById('dealBJ').addEventListener('click',()=>{
        const bet=parseInt(document.getElementById('bjBet').value)||20;
        if(bet>balance){alertMsg('Low balance');return;}
        adjustBalance(-bet);
        const player=Math.floor(Math.random()*11)+10, dealer=Math.floor(Math.random()*11)+10;
        let result=`Player ${player} | Dealer ${dealer}. `, win=0;
        if(player>21) result+='Bust!';
        else if(dealer>21||player>dealer){win=bet*2; result+='You win!';}
        else if(player===dealer){win=bet; result+='Push.';}
        else result+='Dealer wins.';
        if(win) adjustBalance(win);
        document.getElementById('bjTable').innerHTML=result;
      });
    }

    function buildRoulette() {
      contentDiv.innerHTML = `<div style="display:flex; gap:8px;"><span>🎡 Bet:</span><input id="roulBet" class="bet-input" value="15"><select id="roulType"><option value="red">Red 2x</option><option value="black">Black 2x</option><option value="number">Number 5x</option></select><button id="spinRoul">SPIN</button></div><div id="roulResult"></div>`;
      document.getElementById('spinRoul').addEventListener('click',()=>{
        const bet=parseInt(document.getElementById('roulBet').value)||15;
        if(bet>balance)return;
        adjustBalance(-bet);
        const num=Math.floor(Math.random()*15)+1, color=num%2===0?'red':'black';
        const type=document.getElementById('roulType').value; let win=0;
        if(type==='red'&&color==='red') win=bet*2;
        else if(type==='black'&&color==='black') win=bet*2;
        else if(type==='number'&&num===7) win=bet*5;
        if(win)adjustBalance(win);
        document.getElementById('roulResult').innerHTML=`🎯 ${num} (${color}) ${win?'+'+win:'Lose'}`;
      });
    }

    function buildCraps() {
      contentDiv.innerHTML = `<div><span>🎲 Bet:</span><input id="crapsBet" class="bet-input" value="10"><button id="rollCraps">ROLL</button><span id="crapsResult"></span></div>`;
      document.getElementById('rollCraps').addEventListener('click',()=>{
        const bet=parseInt(document.getElementById('crapsBet').value)||10;
        if(bet>balance)return; adjustBalance(-bet);
        const d1=Math.floor(Math.random()*6)+1,d2=Math.floor(Math.random()*6)+1,sum=d1+d2;
        let win=0; if(sum===7||sum===11) win=bet*3; else if(sum===2||sum===3||sum===12) win=0; else win=bet*1.5;
        if(win)adjustBalance(win);
        document.getElementById('crapsResult').textContent=`${d1}+${d2}=${sum} ${win?'Win'+win:'Lose'}`;
      });
    }

    function buildHiLo() {
      contentDiv.innerHTML = `<div>💰 Bet:<input id="hlBet" class="bet-input" value="8"><button id="hlHigher">HIGHER</button><button id="hlLower">LOWER</button><span id="hlCard"></span></div>`;
      let current=Math.floor(Math.random()*13)+2;
      document.getElementById('hlCard').textContent=`Card: ${current}`;
      function play(high){
        const bet=parseInt(document.getElementById('hlBet').value)||8;
        if(bet>balance)return; adjustBalance(-bet);
        const next=Math.floor(Math.random()*13)+2;
        const win=(high && next>current)||(!high && next<current);
        if(win)adjustBalance(bet*2);
        document.getElementById('hlCard').textContent=`${current}→${next} ${win?'Win':'Lose'}`;
        current=next;
      }
      document.getElementById('hlHigher').onclick=()=>play(true);
      document.getElementById('hlLower').onclick=()=>play(false);
    }

    function buildFruitSlots() { buildSlots(); } 
    function buildPokerFlip() {
      contentDiv.innerHTML = `<div>♠️ Bet:<input id="pokeBet" class="bet-input" value="12"><button id="dealPoker">DEAL</button><span id="pokerHand"></span></div>`;
      document.getElementById('dealPoker').addEventListener('click',()=>{
        const bet=parseInt(document.getElementById('pokeBet').value)||12;
        if(bet>balance)return; adjustBalance(-bet);
        const rank=Math.floor(Math.random()*10)+1; let win=0;
        if(rank>=8) win=bet*4; else if(rank>=5) win=bet*1.5;
        if(win)adjustBalance(win);
        document.getElementById('pokerHand').textContent=`Strength ${rank}/10 ${win?'+'+win:'Lose'}`;
      });
    }

    function buildKeno() {
      contentDiv.innerHTML = `<div>🎯 Bet:<input id="kenoBet" class="bet-input" value="5"><button id="pickKeno">PICK 3</button><span id="kenoResult"></span></div>`;
      document.getElementById('pickKeno').addEventListener('click',()=>{
        const bet=parseInt(document.getElementById('kenoBet').value)||5;
        if(bet>balance)return; adjustBalance(-bet);
        const picks=[1,2,3]; const drawn=new Set(); while(drawn.size<5) drawn.add(Math.floor(Math.random()*10)+1);
        const matches=picks.filter(p=>drawn.has(p)).length; let win=matches===3?bet*8:(matches===2?bet*2:0);
        if(win)adjustBalance(win);
        document.getElementById('kenoResult').textContent=`Drawn ${[...drawn]} matches ${matches} ${win?'+'+win:'Lose'}`;
      });
    }

    function buildHorseRace() {
      contentDiv.innerHTML = `<div>🏇 Bet:<input id="horseBet" class="bet-input" value="10"><button id="raceHorse">RACE</button><span id="horseResult"></span></div>`;
      document.getElementById('raceHorse').addEventListener('click',()=>{
        const bet=parseInt(document.getElementById('horseBet').value)||10;
        if(bet>balance)return; adjustBalance(-bet);
        const win=Math.random()<0.4; if(win)adjustBalance(bet*2.5);
        document.getElementById('horseResult').textContent=win?'🏆 Won!':'💨 Lost';
      });
    }

    function buildMines() {
      contentDiv.innerHTML = `<div>💣 Bet:<input id="mineBet" class="bet-input" value="10"><button id="revealMine">REVEAL</button><span id="mineStatus"></span></div>`;
      let active=true;
      document.getElementById('revealMine').addEventListener('click',()=>{
        const bet=parseInt(document.getElementById('mineBet').value)||10;
        if(bet>balance)return; if(!active)return;
        adjustBalance(-bet);
        if(Math.random()<0.3){ active=false; document.getElementById('mineStatus').textContent='💥 BOOM!'; }
        else { let w=bet*1.8; adjustBalance(w); document.getElementById('mineStatus').textContent='✅ Safe +'+w; }
      });
    }

    function buildBaccarat() {
      contentDiv.innerHTML = `<div>🔢 Bet:<input id="bacBet" class="bet-input" value="15"><button id="bacPlayer">PLAYER</button><button id="bacBanker">BANKER</button><span id="bacResult"></span></div>`;
      function play(choice){
        const bet=parseInt(document.getElementById('bacBet').value)||15;
        if(bet>balance)return; adjustBalance(-bet);
        const p=Math.floor(Math.random()*9)+1,b=Math.floor(Math.random()*9)+1; let win=0;
        if((choice==='player'&&p>b)||(choice==='banker'&&b>p)) win=bet*2; else if(p===b) win=bet;
        if(win)adjustBalance(win);
        document.getElementById('bacResult').textContent=`P:${p} B:${b} ${win?'+'+win:'Lose'}`;
      }
      document.getElementById('bacPlayer').onclick=()=>play('player');
      document.getElementById('bacBanker').onclick=()=>play('banker');
    }

    function buildPlinko() {
      contentDiv.innerHTML = `<div>🎱 Bet:<input id="plinkoBet" class="bet-input" value="10"><button id="dropPlinko">DROP</button><span id="plinkoResult"></span></div>`;
      document.getElementById('dropPlinko').addEventListener('click',()=>{
        const bet=parseInt(document.getElementById('plinkoBet').value)||10;
        if(bet>balance)return; adjustBalance(-bet);
        const mult=[0.5,1,1.5,2,3][Math.floor(Math.random()*5)]; const win=Math.floor(bet*mult);
        adjustBalance(win);
        document.getElementById('plinkoResult').textContent=`${mult}x → +${win}`;
      });
    }

    function alertMsg(txt){ document.getElementById('globalMessage').textContent=txt; }

    renderGrid();
    updateUI();
    if(games.length>0){ activeId=games[0].id; titleEl.textContent=games[0].icon+' '+games[0].name; instrEl.textContent=games[0].desc; loadGame(games[0].id); }
    checkRockBottom();
  })();
</script>
</body>
</html>
