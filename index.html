<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>✨ VEGAS ROYALE · 12 GAMES · FULL ANIMATION</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
    }

    body {
      background: #0a0618;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      margin: 0;
      overflow-x: hidden;
    }

    /* animated background particles */
    .bg-particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .particle {
      position: absolute;
      background: radial-gradient(circle, #f9d56e 0%, transparent 70%);
      border-radius: 50%;
      animation: floatUp 6s infinite ease-in;
      opacity: 0;
    }

    @keyframes floatUp {
      0% { transform: translateY(100vh) scale(0); opacity: 0; }
      20% { opacity: 0.8; }
      80% { opacity: 0.6; }
      100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
    }

    .main-layout {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 1400px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 0.8rem;
      gap: 0.4rem;
    }

    /* TOP BAR */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(10, 5, 25, 0.8);
      backdrop-filter: blur(20px);
      border-radius: 4rem;
      padding: 0.8rem 2rem;
      border: 2px solid rgba(212, 175, 55, 0.6);
      box-shadow: 0 20px 40px rgba(0,0,0,0.7), 0 0 30px rgba(255, 200, 0, 0.25);
      flex-shrink: 0;
      animation: slideDown 0.8s ease-out;
    }

    @keyframes slideDown {
      0% { transform: translateY(-100px); opacity: 0; }
      100% { transform: translateY(0); opacity: 1; }
    }

    .balance-area {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    .token-display {
      font-size: 2.8rem;
      font-weight: 900;
      background: linear-gradient(180deg, #ffd966 0%, #b8860b 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 25px gold);
      display: flex;
      align-items: center;
      gap: 0.5rem;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }

    .token-display span {
      background: #1a1230;
      padding: 0.2rem 1.8rem;
      border-radius: 3rem;
      -webkit-text-fill-color: #ffd966;
      border: 2px solid #e6b422;
      box-shadow: inset 0 0 25px rgba(255,215,0,0.5);
    }

    .rock-bottom-alert {
      background: #2d1948;
      padding: 0.5rem 1.5rem;
      border-radius: 2.5rem;
      font-weight: 700;
      color: #f5da81;
      border: 1px dashed #c9a53b;
      font-size: 0.9rem;
      animation: shake 3s infinite;
    }

    @keyframes shake {
      0%,100%{ transform: rotate(0deg); }
      15%{ transform: rotate(2deg); }
      30%{ transform: rotate(-2deg); }
      45%{ transform: rotate(1deg); }
    }

    .btn-gold {
      background: linear-gradient(180deg, #f5d742, #b8860b);
      border: none;
      border-radius: 3rem;
      padding: 0.7rem 2rem;
      font-weight: 800;
      color: #1a1025;
      letter-spacing: 1px;
      cursor: pointer;
      box-shadow: 0 6px 0 #6b4a14, 0 10px 20px black;
      transition: 0.08s;
      text-transform: uppercase;
    }

    .btn-gold:active {
      transform: translateY(4px);
      box-shadow: 0 2px 0 #5a3e12;
    }

    /* MAIN CONTENT: game grid + active game side by side on desktop */
    .content-wrapper {
      display: flex;
      gap: 1rem;
      flex: 1;
      min-height: 0;
    }

    .game-sidebar {
      width: 280px;
      background: rgba(15, 8, 28, 0.7);
      backdrop-filter: blur(20px);
      border-radius: 2.5rem;
      padding: 1rem 0.8rem;
      border: 1px solid rgba(212, 175, 55, 0.5);
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      overflow-y: auto;
      max-height: 100%;
      animation: fadeInLeft 0.8s ease;
    }

    @keyframes fadeInLeft {
      0% { transform: translateX(-50px); opacity: 0; }
      100% { transform: translateX(0); opacity: 1; }
    }

    .game-card {
      background: rgba(30, 20, 50, 0.7);
      border-radius: 2rem;
      padding: 0.8rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.8rem;
      border: 1px solid rgba(210, 160, 40, 0.4);
      cursor: pointer;
      transition: all 0.25s;
      color: #e5d5a4;
      font-weight: 600;
    }

    .game-card:hover {
      background: rgba(60, 40, 90, 0.8);
      border-color: #f5c84e;
      transform: translateX(8px);
      box-shadow: 0 10px 20px rgba(255,215,0,0.3);
    }

    .game-card.active-game {
      border-color: #ffd700;
      box-shadow: 0 0 25px gold;
      background: rgba(80, 50, 120, 0.8);
    }

    .game-icon {
      font-size: 2rem;
      filter: drop-shadow(0 4px 4px black);
    }

    .game-panel {
      flex: 1;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(25px);
      border-radius: 3rem;
      border: 2px solid rgba(212, 175, 55, 0.6);
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
      box-shadow: 0 30px 50px rgba(0,0,0,0.8);
      animation: fadeInRight 0.8s ease;
      overflow-y: auto;
    }

    @keyframes fadeInRight {
      0% { transform: translateX(50px); opacity: 0; }
      100% { transform: translateX(0); opacity: 1; }
    }

    .game-header {
      font-size: 1.8rem;
      font-weight: 800;
      color: #f5d742;
      text-shadow: 0 0 20px black;
    }

    .dynamic-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .reel-container {
      display: flex;
      gap: 20px;
      justify-content: center;
      font-size: 4.5rem;
      background: #120c20;
      padding: 1rem;
      border-radius: 2rem;
      border: 2px solid #b4943a;
    }

    .reel {
      transition: transform 0.2s;
      animation: spinReel 0.4s ease-out;
    }

    @keyframes spinReel {
      0% { transform: translateY(-40px); opacity: 0; }
      100% { transform: translateY(0); opacity: 1; }
    }

    .win-glow {
      animation: glowPulse 0.7s ease 3;
    }

    @keyframes glowPulse {
      0% { box-shadow: 0 0 15px gold; }
      50% { box-shadow: 0 0 60px orange; }
      100% { box-shadow: 0 0 15px gold; }
    }

    .result-badge {
      background: #241f35;
      padding: 1rem;
      border-radius: 2rem;
      font-weight: bold;
      text-align: center;
    }

    @media (max-width: 850px) {
      .content-wrapper {
        flex-direction: column;
      }
      .game-sidebar {
        width: 100%;
        max-height: 180px;
        flex-direction: row;
        flex-wrap: wrap;
        overflow-x: auto;
      }
      .game-card {
        flex: 0 0 auto;
      }
    }
  </style>
</head>
<body>
<div class="bg-particles" id="particlesContainer"></div>

<div class="main-layout">
  <div class="top-bar">
    <div class="balance-area">
      <div class="token-display">💎 <span id="balanceDisplay">500</span></div>
      <div class="rock-bottom-alert">🆘 ROCK BOTTOM = +100</div>
    </div>
    <button class="btn-gold" id="resetBtn">↺ RESET 500</button>
  </div>

  <div class="content-wrapper">
    <div class="game-sidebar" id="gameSidebar"></div>
    <div class="game-panel" id="gamePanel">
      <div class="game-header" id="gameTitle">🎰 SLOTS</div>
      <div class="dynamic-content" id="dynamicContent"></div>
      <div id="globalMessage" style="font-weight:bold; color:#ffd966; text-align:center;"></div>
    </div>
  </div>
</div>

<script>
  (() => {
    // ----- BALANCE SYSTEM -----
    let balance = 500;
    const STORAGE_KEY = 'vegasRoyaleBalance';
    try {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) { let v = parseFloat(saved); if (!isNaN(v) && v >= 0) balance = v; }
    } catch (e) {}

    function save() { localStorage.setItem(STORAGE_KEY, balance); }
    function updateBalanceDisplay() {
      document.getElementById('balanceDisplay').textContent = balance;
      save();
    }

    let rockBottomUsed = false;
    function checkRockBottom() {
      if (balance <= 0) {
        if (!rockBottomUsed) {
          balance += 100;
          rockBottomUsed = true;
          showMessage('🆘 ROCK BOTTOM! +100 tokens gifted.', 'win-glow');
        } else {
          if (balance < 0) balance = 0;
        }
      } else {
        rockBottomUsed = false;
      }
      updateBalanceDisplay();
    }

    function adjustBalance(amount) {
      balance += amount;
      if (balance < 0) balance = 0;
      updateBalanceDisplay();
      checkRockBottom();
    }

    function setBalance(val) {
      balance = val;
      if (balance < 0) balance = 0;
      updateBalanceDisplay();
      checkRockBottom();
    }

    document.getElementById('resetBtn').addEventListener('click', () => {
      setBalance(500);
      rockBottomUsed = false;
      showMessage('🔄 Balance reset to 500.');
    });

    function showMessage(text, className = '') {
      const el = document.getElementById('globalMessage');
      el.textContent = text;
      if (className) {
        el.classList.add(className);
        setTimeout(() => el.classList.remove(className), 800);
      }
    }

    // ----- GAMES DEFINITION -----
    const games = [
      { id: 'slots', name: '🎰 Slots', icon: '🎰', desc: 'Spin & match symbols' },
      { id: 'blackjack', name: '🃏 Blackjack', icon: '🃏', desc: 'Beat dealer 21' },
      { id: 'roulette', name: '🎡 Roulette', icon: '🎡', desc: 'Red/Black/Number' },
      { id: 'craps', name: '🎲 Craps', icon: '🎲', desc: 'Dice 7/11 wins' },
      { id: 'hilo', name: '💰 Hi-Lo', icon: '💰', desc: 'Higher or lower' },
      { id: 'fruitslots', name: '🍒 Fruit Slots', icon: '🍒', desc: 'Juicy classic' },
      { id: 'pokerflip', name: '♠️ Poker Flip', icon: '♠️', desc: '5-card hand rank' },
      { id: 'keno', name: '🎯 Keno', icon: '🎯', desc: 'Pick & match' },
      { id: 'horserace', name: '🏇 Horse Race', icon: '🏇', desc: 'Bet on horse' },
      { id: 'mines', name: '💣 Mines', icon: '💣', desc: 'Avoid bombs' },
      { id: 'baccarat', name: '🔢 Baccarat', icon: '🔢', desc: 'Player vs Banker' },
      { id: 'plinko', name: '🎱 Plinko', icon: '🎱', desc: 'Drop ball multiplier' }
    ];

    let activeGameId = 'slots';

    const sidebar = document.getElementById('gameSidebar');
    const gameTitleEl = document.getElementById('gameTitle');
    const dynamicContent = document.getElementById('dynamicContent');

    function renderSidebar() {
      sidebar.innerHTML = '';
      games.forEach(g => {
        const card = document.createElement('div');
        card.className = 'game-card';
        if (g.id === activeGameId) card.classList.add('active-game');
        card.innerHTML = `<span class="game-icon">${g.icon}</span><span>${g.name}</span>`;
        card.addEventListener('click', () => {
          activeGameId = g.id;
          renderSidebar();
          loadGame(g.id);
          gameTitleEl.textContent = g.icon + ' ' + g.name;
        });
        sidebar.appendChild(card);
      });
    }

    function loadGame(id) {
      dynamicContent.innerHTML = '';
      switch (id) {
        case 'slots': buildSlots(); break;
        case 'blackjack': buildBlackjack(); break;
        case 'roulette': buildRoulette(); break;
        case 'craps': buildCraps(); break;
        case 'hilo': buildHiLo(); break;
        case 'fruitslots': buildFruitSlots(); break;
        case 'pokerflip': buildPokerFlip(); break;
        case 'keno': buildKeno(); break;
        case 'horserace': buildHorseRace(); break;
        case 'mines': buildMines(); break;
        case 'baccarat': buildBaccarat(); break;
        case 'plinko': buildPlinko(); break;
      }
    }

    function betInput(value=10) {
      return `<input class="bet-input" id="gameBet" type="number" value="${value}" min="1" max="${balance}" style="background:#1f1730; border:1px solid #c5a343; border-radius:2rem; padding:0.5rem 1rem; color:#ffe8b0; width:90px; text-align:center;">`;
    }

    // ---------- GAME BUILDERS WITH ANIMATIONS ----------
    function buildSlots() {
      dynamicContent.innerHTML = `
        <div style="display:flex; gap:10px; align-items:center;">${betInput(10)}<button class="btn-gold" id="spinBtn">SPIN</button></div>
        <div class="reel-container" id="reels">🍒 🍋 🍊</div>
        <div class="result-badge" id="slotResult"></div>
      `;
      document.getElementById('spinBtn').addEventListener('click', () => {
        const bet = parseInt(document.getElementById('gameBet').value) || 10;
        if (bet > balance) { showMessage('Not enough tokens'); return; }
        adjustBalance(-bet);
        const symbols = ['🍒','🍋','🍊','🍇','💎','7️⃣'];
        const r1 = symbols[Math.floor(Math.random()*symbols.length)];
        const r2 = symbols[Math.floor(Math.random()*symbols.length)];
        const r3 = symbols[Math.floor(Math.random()*symbols.length)];
        const reelDiv = document.getElementById('reels');
        reelDiv.innerHTML = `<span class="reel">${r1}</span> <span class="reel">${r2}</span> <span class="reel">${r3}</span>`;
        let win = 0;
        if (r1===r2 && r2===r3) win = bet*10;
        else if (r1===r2 || r2===r3 || r1===r3) win = bet*2;
        if (win) { adjustBalance(win); document.getElementById('slotResult').textContent = `🏆 +${win}`; reelDiv.classList.add('win-glow'); setTimeout(()=>reelDiv.classList.remove('win-glow'),700); }
        else document.getElementById('slotResult').textContent = '😵 Loss';
      });
    }

    function buildBlackjack() {
      dynamicContent.innerHTML = `<div style="display:flex; gap:10px;">${betInput(20)}<button class="btn-gold" id="dealBJ">DEAL</button></div><div id="bjTable" style="font-size:1.6rem;"></div>`;
      document.getElementById('dealBJ').addEventListener('click', ()=>{
        const bet = parseInt(document.getElementById('gameBet').value)||20;
        if(bet>balance) return showMessage('Low balance');
        adjustBalance(-bet);
        const player = Math.floor(Math.random()*11)+10, dealer = Math.floor(Math.random()*11)+10;
        let result = `Player ${player} | Dealer ${dealer}. `, win=0;
        if(player>21) result+='Bust';
        else if(dealer>21||player>dealer){win=bet*2; result+='You win!';}
        else if(player===dealer){win=bet; result+='Push';}
        else result+='Dealer wins';
        if(win) adjustBalance(win);
        document.getElementById('bjTable').innerHTML = result;
      });
    }

    function buildRoulette() {
      dynamicContent.innerHTML = `<div style="display:flex; gap:8px;">${betInput(15)}<select id="roulType" style="background:#1f1730;color:gold;border-radius:2rem;padding:0.4rem;"><option value="red">Red 2x</option><option value="black">Black 2x</option><option value="number">Number 5x</option></select><button class="btn-gold" id="spinRoul">SPIN</button></div><div id="roulResult"></div>`;
      document.getElementById('spinRoul').addEventListener('click',()=>{
        const bet=parseInt(document.getElementById('gameBet').value)||15;
        if(bet>balance)return;
        adjustBalance(-bet);
        const num=Math.floor(Math.random()*15)+1, color=num%2===0?'red':'black';
        const type=document.getElementById('roulType').value; let win=0;
        if(type==='red'&&color==='red') win=bet*2;
        else if(type==='black'&&color==='black') win=bet*2;
        else if(type==='number'&&num===7) win=bet*5;
        if(win)adjustBalance(win);
        document.getElementById('roulResult').innerHTML=`🎯 ${num} (${color}) ${win?'+'+win:'Lose'}`;
      });
    }

    function buildCraps() {
      dynamicContent.innerHTML = `<div>${betInput(10)}<button class="btn-gold" id="rollCraps">ROLL</button><span id="crapsResult"></span></div>`;
      document.getElementById('rollCraps').addEventListener('click',()=>{
        const bet=parseInt(document.getElementById('gameBet').value)||10;
        if(bet>balance)return; adjustBalance(-bet);
        const d1=Math.floor(Math.random()*6)+1,d2=Math.floor(Math.random()*6)+1,sum=d1+d2;
        let win=0; if(sum===7||sum===11) win=bet*3; else if(sum===2||sum===3||sum===12) win=0; else win=bet*1.5;
        if(win)adjustBalance(win);
        document.getElementById('crapsResult').textContent=`${d1}+${d2}=${sum} ${win?'Win'+win:'Lose'}`;
      });
    }

    function buildHiLo() {
      dynamicContent.innerHTML = `<div>${betInput(8)}<button class="btn-gold" id="hlHigh">HIGHER</button><button class="btn-gold" id="hlLow">LOWER</button><span id="hlCard"></span></div>`;
      let current=Math.floor(Math.random()*13)+2;
      document.getElementById('hlCard').textContent=`Card: ${current}`;
      function play(high){
        const bet=parseInt(document.getElementById('gameBet').value)||8;
        if(bet>balance)return; adjustBalance(-bet);
        const next=Math.floor(Math.random()*13)+2;
        const win=(high && next>current)||(!high && next<current);
        if(win)adjustBalance(bet*2);
        document.getElementById('hlCard').textContent=`${current}→${next} ${win?'Win':'Lose'}`;
        current=next;
      }
      document.getElementById('hlHigh').onclick=()=>play(true);
      document.getElementById('hlLow').onclick=()=>play(false);
    }

    function buildFruitSlots() { buildSlots(); }
    function buildPokerFlip() {
      dynamicContent.innerHTML = `<div>${betInput(12)}<button class="btn-gold" id="dealPoker">DEAL</button><span id="pokerHand"></span></div>`;
      document.getElementById('dealPoker').addEventListener('click',()=>{
        const bet=parseInt(document.getElementById('gameBet').value)||12;
        if(bet>balance)return; adjustBalance(-bet);
        const rank=Math.floor(Math.random()*10)+1; let win=0;
        if(rank>=8) win=bet*4; else if(rank>=5) win=bet*1.5;
        if(win)adjustBalance(win);
        document.getElementById('pokerHand').textContent=`Strength ${rank}/10 ${win?'+'+win:'Lose'}`;
      });
    }
    function buildKeno() {
      dynamicContent.innerHTML = `<div>${betInput(5)}<button class="btn-gold" id="pickKeno">PICK 3</button><span id="kenoResult"></span></div>`;
      document.getElementById('pickKeno').addEventListener('click',()=>{
        const bet=parseInt(document.getElementById('gameBet').value)||5;
        if(bet>balance)return; adjustBalance(-bet);
        const picks=[1,2,3]; const drawn=new Set(); while(drawn.size<5) drawn.add(Math.floor(Math.random()*10)+1);
        const matches=picks.filter(p=>drawn.has(p)).length; let win=matches===3?bet*8:(matches===2?bet*2:0);
        if(win)adjustBalance(win);
        document.getElementById('kenoResult').textContent=`Drawn ${[...drawn]} matches ${matches} ${win?'+'+win:'Lose'}`;
      });
    }
    function buildHorseRace() {
      dynamicContent.innerHTML = `<div>${betInput(10)}<button class="btn-gold" id="raceHorse">RACE</button><span id="horseResult"></span></div>`;
      document.getElementById('raceHorse').addEventListener('click',()=>{
        const bet=parseInt(document.getElementById('gameBet').value)||10;
        if(bet>balance)return; adjustBalance(-bet);
        const win=Math.random()<0.4; if(win)adjustBalance(bet*2.5);
        document.getElementById('horseResult').textContent=win?'🏆 Won!':'💨 Lost';
      });
    }
    function buildMines() {
      dynamicContent.innerHTML = `<div>${betInput(10)}<button class="btn-gold" id="revealMine">REVEAL</button><span id="mineStatus"></span></div>`;
      let active=true;
      document.getElementById('revealMine').addEventListener('click',()=>{
        const bet=parseInt(document.getElementById('gameBet').value)||10;
        if(bet>balance||!active)return; adjustBalance(-bet);
        if(Math.random()<0.3){ active=false; document.getElementById('mineStatus').textContent='💥 BOOM!';}
        else { let w=bet*1.8; adjustBalance(w); document.getElementById('mineStatus').textContent='✅ Safe +'+w; }
      });
    }
    function buildBaccarat() {
      dynamicContent.innerHTML = `<div>${betInput(15)}<button class="btn-gold" id="bacPlayer">PLAYER</button><button class="btn-gold" id="bacBanker">BANKER</button><span id="bacResult"></span></div>`;
      function play(choice){
        const bet=parseInt(document.getElementById('gameBet').value)||15;
        if(bet>balance)return; adjustBalance(-bet);
        const p=Math.floor(Math.random()*9)+1,b=Math.floor(Math.random()*9)+1; let win=0;
        if((choice==='player'&&p>b)||(choice==='banker'&&b>p)) win=bet*2; else if(p===b) win=bet;
        if(win)adjustBalance(win);
        document.getElementById('bacResult').textContent=`P:${p} B:${b} ${win?'+'+win:'Lose'}`;
      }
      document.getElementById('bacPlayer').onclick=()=>play('player');
      document.getElementById('bacBanker').onclick=()=>play('banker');
    }
    function buildPlinko() {
      dynamicContent.innerHTML = `<div>${betInput(10)}<button class="btn-gold" id="dropPlinko">DROP</button><span id="plinkoResult"></span></div>`;
      document.getElementById('dropPlinko').addEventListener('click',()=>{
        const bet=parseInt(document.getElementById('gameBet').value)||10;
        if(bet>balance)return; adjustBalance(-bet);
        const mult=[0.5,1,1.5,2,3][Math.floor(Math.random()*5)]; const win=Math.floor(bet*mult);
        adjustBalance(win);
        document.getElementById('plinkoResult').textContent=`${mult}x → +${win}`;
      });
    }

    // background particles
    function createParticles() {
      const container = document.getElementById('particlesContainer');
      for (let i=0; i<35; i++) {
        const p = document.createElement('div');
        p.className='particle';
        p.style.left = Math.random()*100+'%';
        p.style.width = p.style.height = (Math.random()*8+3)+'px';
        p.style.animationDuration = (Math.random()*5+5)+'s';
        p.style.animationDelay = Math.random()*5+'s';
        container.appendChild(p);
      }
    }
    createParticles();

    // init
    renderSidebar();
    updateBalanceDisplay();
    loadGame('slots');
    gameTitleEl.textContent = '🎰 Slots';
  })();
</script>
</body>
</html>
